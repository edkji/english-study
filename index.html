<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>영어회화 스터디</title>
<link rel="icon" type="image/png" href="https://img.icons8.com/?size=100&id=fbekNFh9vGQq&format=png">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;600&family=Noto+Sans+KR:wght@300;400;500;700&family=Archivo+Black&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  color-scheme: light;
  --bg:#0e0c0a;--surface:#181410;--card:#211d17;--card2:#2a2520;
  --border:#3a3228;--accent:#e8a838;--accent2:#5bc8a8;--accent3:#e07878;
  --text:#f0e8d8;--muted:#9a8c7a;--muted2:#5a5248;
  --verb:#89d4cf;--adj:#f0a07a;--noun:#a8d8a8;--both:#c4a0d4;--prep:#f0d07a;
}
body.light-mode{
  color-scheme: light;
  --bg:#ffffff;--surface:#f2f2f2;--card:#ffffff;--card2:#f7f7f7;
  --border:#e0ddd8;--accent:#e8a838;--accent2:#2a9a78;--accent3:#c04040;
  --text:#1a1410;--muted:#7a6e62;--muted2:#b0a898;
  --verb:#1a8a88;--adj:#c05010;--noun:#2a7a2a;--both:#7040a0;--prep:#907000;
  background:#ffffff;color:#1a1410;
}
body.light-mode #app-header{background:rgba(255,255,255,.95);border-bottom-color:#e0ddd8;}
body.light-mode .class-card{background:#ffffff;border-color:#e0ddd8;}
/* 라이트모드 카드 라벨 글씨 진하게 */
body.light-mode [style*="color:#00d296"]{color:#007a50!important;}
body.light-mode [style*="color:#50a0ff"]{color:#1050cc!important;}
body.light-mode [style*="color:#ff3333"]{color:#bb0000!important;}
body.light-mode [style*="color:#b48cdc"]{color:#6030aa!important;}
body.light-mode [style*="color:#ffa500"]{color:#b06000!important;}
body.light-mode .class-card:hover{background:#f7f7f7;}
body.light-mode .class-card::before{background:var(--accent);}
body.light-mode .vocab-item{background:#ffffff;border-color:#e0ddd8;}
body.light-mode .tab-btn{background:#ffffff;color:#7a6e62;}
body.light-mode .tab-btn.active{background:#ffffff;color:#1a1410;border-bottom:2px solid var(--accent);}
body.light-mode .quiz-progress{background:#e0ddd8;}
body.light-mode .typing-input{background:#f2f2f2;color:#1a1410;border-color:#e0ddd8;}
body.light-mode .mode-card{background:#ffffff;border-color:#e0ddd8;}
body.light-mode .wn-card{background:#f7f7f7;border-color:#e0ddd8;}
body.light-mode .ltab{color:#7a6e62;border-color:#e0ddd8;}
body.light-mode .ltab.active{background:#e8a838;color:#0e0c0a;border-color:#e8a838;}
body.light-mode .result-box{background:#ffffff;}
body.light-mode .grammar-card{background:#f7f7f7;border-color:#e0ddd8;}
body.light-mode .note-card{background:#f7f7f7;}
body.light-mode #all-vocab-panel,body.light-mode #all-quiz-panel{background:#ffffff;}
body.light-mode .class-header{background:#ffffff;}
body.light-mode .class-tabs{background:#ffffff;border-bottom:1px solid #e0ddd8;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg)!important;color:var(--text)!important;min-height:100vh;overflow-x:hidden}
#app-header{position:sticky;top:0;z-index:100;background:rgba(14,12,10,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 16px}
.header-top{display:flex;align-items:center;gap:12px;padding:14px 0 0}
.app-title{font-family:'Archivo Black',sans-serif;font-size:18px;font-weight:800;color:var(--accent);letter-spacing:-.5px;white-space:nowrap}
.header-back{display:none;align-items:center;gap:8px;background:none;border:none;color:var(--muted);font-size:14px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;padding:4px 0}
.header-back:hover{color:var(--text)}
.header-back svg{width:16px;height:16px}
.level-tabs{display:flex;gap:4px;padding:10px 0 16px;overflow-x:auto;scrollbar-width:none}
.level-tabs::-webkit-scrollbar{display:none}
.ltab{flex-shrink:0;padding:6px 16px;border-radius:20px;border:1px solid var(--border);background:none;color:var(--muted);font-size:13px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .2s;white-space:nowrap}
.ltab.active{background:var(--accent);border-color:var(--accent);color:#0e0c0a;font-weight:700}
.ltab:hover:not(.active){border-color:var(--accent);color:var(--accent)}
.view{display:none;padding:20px 16px;max-width:700px;margin:0 auto}
.view.active{display:block}
.level-head{margin-bottom:20px}
.level-head h2{font-family:'Archivo Black',sans-serif;font-size:22px;font-weight:800;margin-bottom:4px}
.level-head p{color:var(--muted);font-size:13px}
.class-grid{display:grid;gap:12px}
.class-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.class-card::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:var(--accent);border-radius:4px 0 0 4px}
.class-card:hover{background:var(--card2);border-color:var(--accent);transform:translateY(-1px)}
.class-card h3{font-size:16px;font-weight:700;margin-bottom:4px}
.class-card .meta{color:var(--muted);font-size:12px;margin-bottom:12px}
.class-tags{display:flex;gap:6px;flex-wrap:wrap}
.tag{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;border:1px solid}
.tag.verb{color:var(--verb);border-color:var(--verb);background:rgba(137,212,207,.1)}
.tag.adj{color:var(--adj);border-color:var(--adj);background:rgba(240,160,122,.1)}
.tag.noun{color:var(--noun);border-color:var(--noun);background:rgba(168,216,168,.1)}
.tag.prep{color:var(--prep);border-color:var(--prep);background:rgba(240,208,122,.1)}
.tag.count{color:var(--muted);border-color:var(--border);background:none}
.class-title{font-family:'Archivo Black',sans-serif;font-size:20px;font-weight:800;margin-bottom:2px}
.class-meta{color:var(--muted);font-size:12px;margin-bottom:16px}
.tab-bar{display:flex;gap:2px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border);margin:0 -16px;padding:0 16px}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{flex-shrink:0;padding:10px 14px;border:none;background:none;color:var(--muted);font-size:13px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s;white-space:nowrap}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:700}
.tab-btn:hover:not(.active){color:var(--text)}
.tab-panel{display:none;padding-top:20px}
.tab-panel.active{display:block}
/* VOCAB */
.vocab-filter{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.filter-btn{padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:none;color:var(--muted);font-size:12px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .2s}
.filter-btn[data-f="all"].active{background:var(--card2);color:var(--text);border-color:var(--muted2)}
.filter-btn[data-f="verb"].active{background:rgba(137,212,207,.15);color:var(--verb);border-color:var(--verb)}
.filter-btn[data-f="adj"].active{background:rgba(240,160,122,.15);color:var(--adj);border-color:var(--adj)}
.filter-btn[data-f="noun"].active{background:rgba(168,216,168,.15);color:var(--noun);border-color:var(--noun)}
.filter-btn[data-f="prep"].active{background:rgba(240,208,122,.15);color:var(--prep);border-color:var(--prep)}
.filter-btn[data-f="both"].active{background:rgba(196,160,212,.15);color:var(--both);border-color:var(--both)}
.vocab-list{display:grid;gap:8px}
.vocab-item{display:flex;align-items:center;justify-content:space-between;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;gap:12px}
.vocab-left{display:flex;align-items:center;gap:8px}
.vocab-en{font-family:'Noto Sans',sans-serif;font-size:15px;font-weight:600;color:var(--text)}
.vocab-kr{font-size:13px;color:var(--muted);text-align:right}
.type-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.type-dot.verb{background:var(--verb)}.type-dot.adj{background:var(--adj)}.type-dot.noun{background:var(--noun)}.type-dot.both{background:var(--both)}.type-dot.prep{background:var(--prep)}
/* GRAMMAR */
.grammar-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:14px}
.grammar-title{font-size:14px;font-weight:700;color:var(--accent);margin-bottom:12px}
.pattern-box{background:var(--surface);border-radius:10px;padding:14px 16px;margin-bottom:12px;border-left:3px solid var(--accent)}
.pattern-row{display:flex;gap:8px;margin-bottom:8px;align-items:flex-start}
.pattern-row:last-child{margin-bottom:0}
.pr-label{font-size:11px;color:var(--muted);padding-top:3px;flex-shrink:0;min-width:36px;font-family:'Noto Sans KR',sans-serif}
.pr-text{font-size:13px;font-family:'Noto Sans',sans-serif;line-height:1.6;color:var(--text)}
.grammar-note{font-size:12px;color:var(--accent);margin-bottom:10px;padding:8px 12px;background:rgba(232,168,56,.08);border-radius:8px;border-left:2px solid var(--accent)}
.grammar-ex-title{font-size:11px;color:var(--muted);margin-bottom:8px;letter-spacing:.5px}
.grammar-ex-item{font-size:13px;color:var(--muted);padding:7px 0;border-bottom:1px solid var(--border);font-family:'Noto Sans',sans-serif;line-height:1.5}
.grammar-ex-item:last-child{border-bottom:none}
/* EXAMPLES */
.example-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:10px}
.ex-num{font-size:10px;color:var(--muted2);font-family:'Noto Sans',sans-serif;margin-bottom:8px}
.ex-row{display:flex;gap:10px;align-items:flex-start}
.ex-kr{font-size:14px;font-weight:500;flex:1;min-width:0}
.ex-en{font-size:13px;font-family:'Noto Sans',sans-serif;color:var(--accent);flex:1.5;min-width:0;line-height:1.6}
.ex-divider{height:1px;background:var(--border);margin:10px 0}
.ex-ans-kr{font-size:13px;color:var(--muted);flex:1;min-width:0}
.ex-ans-en{font-size:13px;font-family:'Noto Sans',sans-serif;color:var(--accent2);flex:1.5;min-width:0;line-height:1.6}
/* NOTES */
.note-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:10px}
.note-title{font-size:13px;font-weight:700;color:var(--accent);margin-bottom:8px}
.note-title::before{content:'📌 '}
.note-content{font-size:13px;color:var(--text);line-height:1.8;white-space:pre-line;margin-bottom:10px}
.note-example{background:var(--surface);border-radius:8px;padding:10px 12px;font-family:'Noto Sans',sans-serif;font-size:12px;color:var(--muted);border-left:2px solid var(--accent2);white-space:pre-line;line-height:1.8}
/* QUIZ */
.quiz-mode-select{display:grid;gap:10px}
.mode-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 20px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:14px}
.mode-card:hover{border-color:var(--accent);background:var(--card2)}
.mode-icon{font-size:24px;width:40px;text-align:center;flex-shrink:0}
.mode-info h4{font-size:15px;font-weight:700;margin-bottom:3px}
.mode-info p{font-size:12px;color:var(--muted)}
.quiz-active{display:none}.quiz-active.show{display:block}
.quiz-mode-select.hide{display:none}
.quiz-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.quiz-mode-title{font-size:14px;font-weight:700;color:var(--accent)}
.quiz-exit-btn{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:none;color:var(--muted);font-size:12px;cursor:pointer;font-family:'Noto Sans KR',sans-serif}
.quiz-exit-btn:hover{border-color:var(--accent3);color:var(--accent3)}
.quiz-progress{height:4px;background:var(--border);border-radius:4px;margin-bottom:20px;overflow:hidden}
.quiz-progress-bar{height:100%;background:var(--accent);border-radius:4px;transition:width .3s ease}
.quiz-counter{font-size:11px;color:var(--muted);text-align:right;margin-bottom:8px}
.quiz-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:28px 20px;text-align:center;margin-bottom:16px;min-height:130px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px}
.quiz-label{font-size:11px;color:var(--muted);letter-spacing:.5px;margin-bottom:4px}
.quiz-q-main{font-size:21px;font-weight:700;line-height:1.4;word-break:break-word}
.quiz-q-sub{font-size:13px;color:var(--muted)}
.quiz-options{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.opt-btn{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 10px;cursor:pointer;font-family:'Noto Sans',sans-serif;font-size:13px;color:var(--text);transition:all .2s;text-align:center;line-height:1.4;min-height:52px;display:flex;align-items:center;justify-content:center;word-break:break-word}
.opt-btn:hover:not(:disabled){background:var(--card2);border-color:var(--muted2)}
.opt-btn.correct{background:rgba(91,200,168,.15);border-color:var(--accent2);color:var(--accent2)}
.opt-btn.wrong{background:rgba(224,120,120,.15);border-color:var(--accent3);color:var(--accent3)}
.opt-btn:disabled{cursor:default}
.quiz-feedback{text-align:center;padding:14px;border-radius:12px;font-size:14px;font-weight:700;display:none;margin-bottom:12px}
.quiz-feedback.correct{background:rgba(91,200,168,.15);color:var(--accent2);display:block}
.quiz-feedback.wrong{background:rgba(224,120,120,.15);color:var(--accent3);display:block}
.quiz-next-btn{width:100%;padding:14px;border-radius:12px;border:none;background:var(--accent);color:#0e0c0a;font-size:15px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;display:none}
.quiz-next-btn.show{display:block}
.quiz-next-btn:hover{opacity:.85}
.quiz-result{text-align:center;padding:40px 20px;display:none}
.quiz-result.show{display:block}
.result-emoji{font-size:52px;margin-bottom:16px}
.result-score{font-family:'Archivo Black',sans-serif;font-size:48px;font-weight:800;color:var(--accent);margin-bottom:8px}
.result-label{font-size:14px;color:var(--muted);margin-bottom:24px}
.result-btn{display:inline-block;padding:12px 24px;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;margin:0 6px 10px;transition:all .2s}
/* TYPING QUIZ */
.typing-wrap{width:100%;margin-bottom:16px}
.typing-input{width:100%;padding:14px 16px;background:var(--card);border:1px solid var(--border);border-radius:12px;color:var(--text);font-family:'Noto Sans',sans-serif;font-size:15px;outline:none;transition:border-color .2s;caret-color:var(--accent)}
.typing-input:focus{border-color:var(--accent)}
.typing-input.correct-input{border-color:var(--accent2);background:rgba(91,200,168,.08)}
.typing-input.wrong-input{border-color:var(--accent3);background:rgba(224,120,120,.08)}
.typing-submit{width:100%;padding:13px;border-radius:12px;border:1px solid var(--accent);background:none;color:var(--accent);font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;margin-top:8px;transition:all .2s}
.typing-submit:hover{background:var(--accent);color:#0e0c0a}
.typing-hint{font-size:11px;color:var(--muted);text-align:center;margin-top:6px}
.model-ans-box{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 14px;margin-bottom:10px;font-size:13px;color:var(--muted);line-height:1.6}
.model-ans-box strong{color:var(--accent2);font-family:'Noto Sans',sans-serif;display:block;margin-top:4px}
.self-correct-btn{width:100%;padding:11px;border-radius:10px;border:1px solid var(--accent);background:none;color:var(--accent);font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;margin-bottom:8px;transition:all .2s}
.self-correct-btn:hover{background:var(--accent);color:#0e0c0a}
/* 오답노트 탭 */
.wn-empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:13px}
.wn-summary{display:flex;gap:10px;margin-bottom:16px}
.wn-stat{flex:1;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center}
.wn-stat-num{font-size:24px;font-weight:700;font-family:'Archivo Black',sans-serif;margin-bottom:2px}
.wn-stat-num.red{color:var(--accent3)}.wn-stat-num.yellow{color:var(--accent)}.wn-stat-num.green{color:var(--accent2)}
.wn-stat-label{font-size:11px;color:var(--muted)}
.wn-section-title{font-size:11px;color:var(--muted);letter-spacing:.5px;margin-bottom:10px;margin-top:20px}
.wn-card{background:var(--card);border-radius:12px;padding:14px 16px;margin-bottom:8px;border:1px solid var(--border)}
.wn-card.danger{border-color:rgba(224,120,120,.4)}
.wn-card.warn{border-color:rgba(232,168,56,.3)}
.wn-card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.wn-card-q{font-size:14px;font-weight:600;color:var(--text);flex:1;min-width:0}
.wn-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;flex-shrink:0;margin-left:8px}
.wn-badge.danger{background:rgba(224,120,120,.15);color:var(--accent3)}
.wn-badge.warn{background:rgba(232,168,56,.15);color:var(--accent)}
.wn-ans{font-size:12px;color:var(--muted);font-family:'Noto Sans',sans-serif;margin-bottom:4px}
.wn-wrong-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.wn-wrong-tag{font-size:11px;padding:2px 8px;border-radius:12px;background:rgba(224,120,120,.1);color:var(--accent3);font-family:'Noto Sans',sans-serif}
.wn-clear-btn{width:100%;padding:12px;border-radius:12px;border:1px solid var(--border);background:none;color:var(--muted);font-size:13px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;margin-top:16px;transition:all .2s}
.wn-clear-btn:hover{border-color:var(--accent3);color:var(--accent3)}
.tts-btn{background:none;border:none;cursor:pointer;padding:4px 6px;border-radius:8px;color:var(--muted);font-size:16px;line-height:1;transition:color .2s;flex-shrink:0}
.tts-btn:hover{color:var(--accent)}
.tts-btn.playing{color:var(--accent2);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.result-btn.primary{border:1px solid var(--accent);background:none;color:var(--accent)}
.result-btn.primary:hover{background:var(--accent);color:#0e0c0a}
.result-btn.secondary{border:1px solid var(--border);background:none;color:var(--muted)}
.result-btn.secondary:hover{border-color:var(--text);color:var(--text)}
</style>
</head>
<body>

<!-- Kokoro TTS 로딩 배너 -->
<div id="tts-loading-banner" style="display:none;position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--accent);border-radius:20px;padding:10px 20px;font-size:13px;color:var(--accent);font-family:'Noto Sans KR',sans-serif;z-index:9999;gap:8px;align-items:center;box-shadow:0 4px 20px rgba(0,0,0,.3)">
  <span style="animation:pulse 1s infinite">🔊</span> 고품질 음성 로딩 중... (최초 1회)
</div>

<div id="app-header">
  <div class="header-top">
    <button class="header-back" id="back-btn" onclick="goBack()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15,18 9,12 15,6"/></svg>
      뒤로
    </button>
    <div class="app-title">📚 영어회화 스터디</div>
    <button id="theme-btn" onclick="toggleTheme()" style="margin-left:auto;background:none;border:1px solid var(--border);border-radius:20px;padding:5px 12px;cursor:pointer;font-size:13px;color:var(--muted);font-family:'Noto Sans KR',sans-serif;transition:all .2s">🌙</button>
  </div>
  <div class="level-tabs" id="level-tabs"></div>
</div>

<!-- 목소리 선택 모달 -->

<div class="view active" id="view-level">
  <div class="level-head"><h2 id="lv-name"></h2><p id="lv-desc"></p></div>
  <div class="class-grid" id="class-grid"></div>
</div>

<!-- 전체 단어장/퀴즈 뷰 -->

      note:"these days는 항상 문장 맨 뒤에 와요.",
      examples:[

    {
      title:"빈도 표현 (once / twice / times)",
      pattern:"[횟수] + a + [시간단위]",

      title:"의문사 (Wh- questions)",

    {title:"3인칭 단수 s/es 규칙",content:"He, She, 사람이름이 주어일 때 동사에 s나 es를 붙여요.\n-s: eat→eats, drink→drinks, play→plays\n-es: go→goes, watch→watches, teach→teaches\n-es: s, sh, ch, x, o로 끝나는 동사",example:"I eat  →  She eats\nI go   →  He goes\nI watch →  She watches\nI teach →  He teaches"},
    {title:"빈도부사 순서 (높→낮)",content:"always (100%) 항상\nusually (80%) 주로, 보통\noften (60%) 대개, 종종\nsometimes (40%) 가끔\nhardly / rarely (10%) 거의 ~안 해\nnever (0%) 절대 ~안 해",example:"I always brush my teeth.\nI usually eat breakfast.\nI sometimes skip lunch.\nI never drink alcohol."},
    {title:"these days 위치",content:"these days (요즘)는 항상 문장 맨 끝에 와요.\n앞에 오면 어색하거나 틀린 표현이에요.",example:"I work out at the gym these days.   ✅\nThese days I work out.               ⚠️ (특별 강조 시에만)"},
    {title:"외식하다: eat out",content:"eat out = 밖에서 (식당에서) 먹다\n반대: eat at home, cook at home",example:"We usually eat out on the weekends.\nI don't eat out during the week."},
    {title:"산책하다 vs 산책시키다",content:"take a walk: (내가) 산책하다\nwalk + 동물/사람: ~를 산책시키다",example:"I take a walk every morning.\nShe walks her dog every day.\nI walk my dog in the park."},
    {title:"hardly / rarely",content:"둘 다 '거의 ~하지 않는다'는 뜻이에요.\nnever(절대 안 해)보다는 조금 더 하는 느낌.",example:"I hardly watch TV.  (거의 안 봐)\nI rarely eat fast food. (거의 안 먹어)\nShe hardly ever cooks. (거의 안 해)"},
    {title:"miss school",content:"miss school: 학교에 빠지다, 결석하다\nmiss는 '~를 그리워하다'는 뜻도 있어요.",example:"I never miss school. (결석 안 해)\nI miss my family. (가족이 그리워)"},
    {title:"의문사 정리",content:"why: 왜\nwhen: 언제\nwho: 누구\nwhere: 어디\nhow: 어떻게\nwhat: 무엇\nhow often: 얼마나 자주\nhow long: 얼마나 오래",example:"Why do you study English?\nHow often do you exercise?\nHow long do you sleep?"},

  notes:[
    {title:"wanted to / had to (과거형)",content:"want to → wanted to  (하고 싶었다)\nhave to → had to  (해야 했다)",example:"I wanted to go to London last year.\nI wanted to play when I was young.\nI had to study hard yesterday.\nI had to exercise for my health."},
    {title:"don't have to ≠ must not",content:"don't have to: 안 해도 돼 (선택)\nmust not: 하면 안 돼 (금지)\n\n완전히 다른 뜻이에요!",example:"You don't have to come.  (안 와도 돼) ✅\nYou must not smoke here. (피우면 안 돼) ✅"},
    {title:"the vs a",content:"the: 이미 알고 있는 특정한 것\na: 불특정 단수 (그냥 하나)\n\n장소 앞에는 주로 the를 써요.",example:"go to the hospital ✅\ngo to the market ✅\nI want to watch a movie. (그냥 영화)\nDid you see the movie? (그 영화)"},
    {title:"someday / one day",content:"someday / one day: 언젠간\n미래의 막연한 희망을 나타내요.",example:"I want to be good at English someday.\nI want to travel the world one day."},
    {title:"~까지 by (기한)",content:"by + 시간: ~까지 (마감)\n≈ before와 비슷하지만 기한 강조할 때 by를 써요.",example:"I have to finish by tomorrow morning.\nI have to pay by tomorrow 4PM.\nI have to be there by 7PM."},
    {title:"because of vs for (이유/목적)",content:"because of: ~때문에 (강제적 이유)\nfor: ~를 위해서 (목적, 위함)",example:"I exercise because of my health.  (건강 때문에)\nI exercise for my health.          (건강을 위해서)\n→ 둘 다 자주 쓰여요. 뉘앙스 차이!"},

  grammar:[
    {
      title:"과거형 기본 구조",
      pattern:"주어 + [동사 과거형] + ...",
      rows:[

        {label:"짧은 답",text:"Yes, I did.  /  No, I didn't."},
      ],
      note:"did가 있으면 뒤에 동사원형! did가 과거 역할을 해요.",
      examples:[
        "Did you call me?     →  Yes, I called you.",
        "Did you meet her?    →  No, I didn't meet her.",
        "I went to Seoul in the evening.",
        "I bought a dress.",
        "I didn't go shopping yesterday.",
      ]
    },
    {
      title:"의문사 + did (과거 질문)",
      pattern:"[의문사] + did + 주어 + [동사원형] ~?",
      rows:[
        {label:"Why",text:"Why did you call me?  →  Because, I..."},
        {label:"Where",text:"Where did you meet her?  →  I met her at..."},
        {label:"What",text:"What did you do yesterday?  →  I..."},
        {label:"How",text:"How did you get here?  →  I took the subway."},
      ],
      note:"의문사 뒤에도 did + 동사원형 순서를 기억해요.",
      examples:[
        "Why did you go to Seoul?      →  Because I had a drink with my friend.",
        "What did you buy?             →  I bought a dress.",
        "Where did you go yesterday?   →  I went to Lotte World with Veronica.",
        "Why did you buy the dress?    →  Because I'm going to a party next Saturday.",
      ]
    },
    {
      title:"불규칙 동사 과거형",
      pattern:"외워야 하는 대표 불규칙 동사들",
      rows:[
        {label:"go",text:"go → went"},

        {label:"buy",text:"buy → bought / bring → brought"},

  notes:[
    {title:"Do/Did/Are/Is/Does 한눈에",content:"Did   → 과거 질문\nAre   → 현재 상태 (you/we/they)\nIs    → 현재 상태 (he/she/it)\nDo    → 현재 습관 (I/you/we/they)\nDoes  → 현재 습관 (he/she/사람이름)",example:"Did you call? (과거)\nAre you tired? (현재 상태)\nIs she a doctor? (3인칭 상태)\nDo you smoke? (습관)\nDoes he work? (3인칭 습관)"},
    {title:"mad = angry",content:"mad: 화난 (= angry)\nmad at + 사람: ~에게 화난\n구어체에서 angry보다 mad를 더 많이 써요.",example:"Are you mad at me?\nShe's really mad at him.\nI'm not angry. / I'm not mad."},
    {title:"How is vs How was",content:"How is ~? : 지금 어때? (현재)\nHow was ~? : 어땠어? (과거)",example:"How is the movie?     (지금 보고 있는 영화)\nHow was the movie?    (다 보고 난 후)\nHow is your day?      (지금 하루)\nHow was your day?     (하루 끝나고)"},
    {title:"How often vs How many times",content:"How often: 빈도를 막연하게 물을 때\nHow many times: 구체적인 횟수를 물을 때\n\n횟수 표현: a day / a week / a month / a year",example:"How often do you exercise?          (얼마나 자주?)\nHow many times a week do you exercise? (일주일에 몇 번?)\nHow many cups of coffee a day?      (하루에 몇 잔?)"},
    {title:"How much = 정도/양",content:"How much: 얼마나 (정도, 양, 가격)\n셀 수 없는 것의 양이나 감정의 정도를 물어요.",example:"How much do you like him?   (얼마나 좋아해?)\nHow much is it?             (얼마예요? = 가격)\nHow much water do you drink? (물 얼마나 마셔?)"},
    {title:"Are you ~ing? (진행) vs Are you 형용사? (상태)",content:"Are you sleeping? → 지금 자고 있어? (진행)\nAre you sleepy?   → 졸려? (상태, 형용사)\n\n~ing는 지금 이 순간 하고 있는 동작!",example:"Are you sleeping?      (진행 중)\nAre you sleepy?        (상태)\nAre you waiting?       (진행 중)\nAre you tired?         (상태)"},
    {title:"start ~ing / start to ~",content:"~하기 시작하다: start + ~ing 또는 start + to 동사원형\n둘 다 맞아요.",example:"When did you start studying English?\nWhen did you start to study English?\nI started learning piano last year."},

  notes:[
    {title:"소유격 정리",content:"my: 나의\nyour: 너의\nhis: 그의\nher: 그녀의\n사람이름 + 's: ~의",example:"my friend / your phone\nhis car / her house\nSophie's number / Tom's class"},
    {title:"give money to = pay",content:"I gave money to him. = I paid him.\ngive to + 사람: ~에게 주다\npay: 계산하다, 지불하다",example:"I gave money to him.   (= I paid him)\nI'll pay for dinner.\nCan I pay by card?"},
    {title:"at all (전혀, 절대로)",content:"부정문 맨 끝에 at all을 붙이면\n'전혀 ~하지 않았다'는 강한 부정이 돼요.",example:"I didn't sleep at all.      (전혀 못 잤어)\nI didn't eat at all.        (아무것도 안 먹었어)\nShe doesn't like him at all. (전혀 안 좋아해)"},
    {title:"appear vs disappear",content:"appear: 나타나다\ndisappear: 사라지다\n반대말이에요.",example:"He didn't come.  (= He didn't appear)\nShe disappeared.  (그녀가 사라졌어)"},
    {title:"두통/치통/복통",content:"두통: headache\n치통: toothache\n복통: stomachache\n머리/이/배 + ache",example:"I had a headache yesterday.\nI have a toothache.\nI have a stomachache.\npill (알약) / medicine (약 전반)"},
    {title:"Are you ~ing? vs Are you 형용사?",content:"Are you ~ing? → 지금 뭐 하고 있어? (행동)\nAre you 형용사? → 상태가 어때? (상태)\n\n~ing: 지금 이 순간 진행 중인 동작",example:"Are you working?    (일하고 있어?) ← 행동\nAre you tired?      (피곤해?) ← 상태\nAre you eating?     (먹고 있어?) ← 행동\nWhat are you doing? (뭐하고 있어?)"},
    {title:"What kind of = Which = What",content:"세 표현 모두 종류/선택을 물어볼 때 써요.",example:"What kind of movies do you like?\nWhich movies do you like?\nWhat movie do you like?\n→ 다 같은 뜻이에요!"},

function toggleTheme(){
  const isLight=document.body.classList.toggle('light-mode');
  const btn=document.getElementById('theme-btn');
  btn.textContent=isLight?'🌙 다크':'☀️ 라이트';
  applyCardColors(isLight);
  try{localStorage.setItem('theme',isLight?'light':'dark');}catch(e){}
}

function applyCardColors(isLight){
  if(!isLight) return; // 다크모드는 원래대로
  document.querySelectorAll('.class-card').forEach(card=>{
    const s=card.style.borderColor||card.getAttribute('style')||'';
    if(s.includes('0,210,150')) card.style.borderColor='rgba(0,160,100,.9)';
    else if(s.includes('80,160,255')) card.style.borderColor='rgba(30,100,230,.9)';
    else if(s.includes('255,50,50')) card.style.borderColor='rgba(200,20,20,.9)';
    else if(s.includes('180,130,230')) card.style.borderColor='rgba(120,60,200,.9)';
    else if(s.includes('255,165,0')||s.includes('255,160,0')) card.style.borderColor='rgba(200,120,0,.9)';
  });
}

function setVocabFilter(type){
  window._allVocabFilter=type;
  window._allVocabPage=0;
  const labels={'':'전체','verb':'동사','noun':'명사','adj':'형용사','both':'표현','__unseen__':'🔄 아직'};
  document.querySelectorAll('.vf-btn').forEach(b=>{
    const isActive=b.textContent===labels[type];
    b.style.cssText='padding:6px 12px;border-radius:20px;font-size:12px;cursor:pointer;'+(isActive?'border:1px solid var(--accent);background:var(--accent);color:#0e0c0a':'border:1px solid var(--border);background:none;color:var(--muted)');

const PAGE_SIZE=20;

function renderAllVocabList(){
  const search=(document.getElementById('all-vocab-search')||{}).value||'';
  const filter=window._allVocabFilter||'';
  const page=window._allVocabPage||0;
  const learned=window._learnedSet||(window._learnedSet=new Set());
  const allClasses=DATA.levels.flatMap(lv=>lv.classes.map(cl=>({...cl,levelName:lv.name})));
  let items=allClasses.flatMap(cl=>cl.vocab.map(v=>({...v,className:cl.name,levelName:cl.levelName})));
  const seen=new Set();
  items=items.filter(v=>{const k=v.en.toLowerCase();if(seen.has(k))return false;seen.add(k);return true;});
  if(filter==='__unseen__') items=items.filter(v=>!learned.has(v.en));
  else if(filter) items=items.filter(v=>v.type===filter);
  if(search) items=items.filter(v=>v.en.toLowerCase().includes(search.toLowerCase())||v.kr.includes(search));
  const total=items.length;
  const learnedCount=items.filter(v=>learned.has(v.en)).length;
  const statsEl=document.getElementById('all-vocab-stats');
  if(statsEl) statsEl.textContent=total+'개 중 '+learnedCount+'개 완료 ✅';
  const totalPages=Math.max(1,Math.ceil(total/PAGE_SIZE));
  const safeP=Math.min(page,totalPages-1);
  if(safeP!==window._allVocabPage) window._allVocabPage=safeP;
  const pageItems=items.slice(safeP*PAGE_SIZE,(safeP+1)*PAGE_SIZE);
  const list=document.getElementById('all-vocab-list');
  if(!list) return;
  if(!pageItems.length){list.innerHTML='<div style="text-align:center;padding:30px;color:var(--muted)">단어가 없어요.</div>';
    const pg=document.getElementById('all-vocab-pagination');if(pg)pg.innerHTML='';return;}
  list.innerHTML=pageItems.map((v,idx)=>{
    const safe=v.en.replace(/'/g,"&#39;");
    const isLearned=learned.has(v.en);
    const globalIdx=safeP*PAGE_SIZE+idx;
    return '<div id="fc-'+globalIdx+'" onclick="flipCard('+globalIdx+')" style="opacity:'+(isLearned?'0.45':'1')+';margin-bottom:10px;cursor:pointer;perspective:600px">'
      +'<div id="fi-'+globalIdx+'" style="position:relative;width:100%;transition:transform .4s;transform-style:preserve-3d;min-height:80px">'
      +'<div style="position:relative;backface-visibility:hidden;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 16px;display:flex;justify-content:space-between;align-items:center">'
      +'<div>'
      +'<div style="font-family:sans-serif;font-size:18px;font-weight:700;color:var(--text)">' + v.en + '</div>'
      +'<div style="font-size:11px;color:var(--muted);margin-top:4px">'+v.levelName+' · '+v.className+'</div>'
      +'</div>'
      +'<div style="display:flex;gap:8px;align-items:center">'
      +'<button class="tts-btn" onclick="event.stopPropagation();tts(\'' + safe + '\',this)">🔊</button>'
      +'<button onclick="event.stopPropagation();toggleLearned(\'' + safe + '\',' + globalIdx + ')" style="background:none;border:1px solid ' + (isLearned ? 'var(--accent2)' : 'var(--border)') + ';border-radius:8px;padding:4px 10px;cursor:pointer;font-size:12px;color:' + (isLearned ? 'var(--accent2)' : 'var(--muted)') + '">' + (isLearned ? '✅' : '체크') + '</button>'
      +'</div>'
      +'</div>'
      +'<div style="position:absolute;top:0;left:0;width:100%;backface-visibility:hidden;background:var(--card2);border:1px solid var(--accent);border-radius:14px;padding:18px 16px;transform:rotateX(180deg);box-sizing:border-box;min-height:80px;display:flex;align-items:center">'
      +'<div>'
      +'<div style="font-family:sans-serif;font-size:18px;font-weight:700;color:var(--accent)">'+v.kr+'</div>'
      +'<div style="font-size:12px;color:var(--muted);margin-top:4px">'+v.en+'</div>'
      +'</div>'
      +'</div>'
      +'</div></div>';
  }).join('');
  const pg=document.getElementById('all-vocab-pagination');
  if(pg) pg.innerHTML=(totalPages<=1)?'':
    '<button onclick="vocabPage('+(safeP-1)+')" '+(safeP===0?'disabled':'')+' style="padding:8px 16px;border-radius:10px;border:1px solid var(--border);background:none;color:var(--muted);cursor:pointer">← 이전</button>'
    +'<span style="color:var(--muted);font-size:13px">'+(safeP+1)+' / '+totalPages+'</span>'
    +'<button onclick="vocabPage('+(safeP+1)+')" '+(safeP>=totalPages-1?'disabled':'')+' style="padding:8px 16px;border-radius:10px;border:1px solid var(--border);background:none;color:var(--muted);cursor:pointer">다음 →</button>';
}

function flipCard(idx){
  const fi=document.getElementById('fi-'+idx);
  if(!fi)return;
  fi.style.transform=fi.style.transform.includes('180')?'rotateX(0deg)':'rotateX(180deg)';
}

function toggleLearned(en,idx){
  const learned=window._learnedSet||(window._learnedSet=new Set());
  if(learned.has(en))learned.delete(en);else learned.add(en);
  try{localStorage.setItem('learnedVocab',JSON.stringify([...learned]));}catch(e){}
  renderAllVocabList();
}

function vocabPage(p){
  window._allVocabPage=p;
  renderAllVocabList();
  const el=document.getElementById('all-vocab-list');
  if(el)el.scrollIntoView({behavior:'smooth',block:'start'});
}

function filterAllVocab(){
  window._allVocabPage=0;

}

  };
  let questions=[];
  if(mode==='kr2en') questions=shuffle(buildKr2En(megaCl)).slice(0,20);
  else if(mode==='blank') questions=shuffle(buildBlank(megaCl)).slice(0,20);

const shuffle=a=>[...a].sort(()=>Math.random()-.5);
const pick=(a,n)=>shuffle(a).slice(0,n);

function buildKr2En(cl){
  return shuffle(cl.vocab).map(v=>{
    const wrong=pick(cl.vocab.filter(w=>w.en!==v.en),3).map(w=>w.en);
    const lbl={verb:'동사',adj:'형용사',noun:'명사',both:'동사/명사',prep:'전치사'}[v.type];
    return {label:'한국어 → 영어',main:v.kr,sub:`[${lbl}]`,correct:v.en,options:shuffle([v.en,...wrong])};
  });
}

// ── 예문 배열에서 자동으로 빈칸 문제 생성 ──
function autoBlankFromExamples(cl){
  const PREPS=['in','at','on','for','with','to','about','every','before','after'];
  const SKIP=new Set(['am','is','are','do','don','i','you','my','a','an','the','yes','no','not','very','two','so','it','this','that','its','his','her']);
  const results=[];

  // vocab 단어 빠른 조회용 맵
  const vocabMap={};
  cl.vocab.forEach(v=>{
    v.en.split(' ').forEach(w=>{ vocabMap[w.toLowerCase()]=v; });
    vocabMap[v.en.toLowerCase()]=v;
  });

  cl.examples.forEach(e=>{
    const pairs=[
      {sent:e.en, hint:e.kr},
      ...(e.en_ans?[{sent:e.en_ans, hint:e.kr_ans}]:[])
    ];

    pairs.forEach(({sent,hint})=>{
      if(!sent||sent.length<8) return;
      const stripped=sent.replace(/[?.!,]/g,'');
      const words=stripped.split(/\s+/);
      const suffix=sent.trim().endsWith('?')?'?':'.';

      // 전략 1: 전치사 빈칸
      words.forEach((word,idx)=>{
        const lw=word.toLowerCase();
        if(!PREPS.includes(lw)) return;
        const wrong=PREPS.filter(p=>p!==lw);
        const blanked=[...words]; blanked[idx]='___';
        results.push({sentence:blanked.join(' ')+suffix, blank:word, hint:hint||'', distractors:pick(wrong,3), src:'prep'});
      });

      // 전략 2: vocab 단어 빈칸 (같은 품사 오답)
      words.forEach((word,idx)=>{
        const lw=word.toLowerCase();
        if(SKIP.has(lw)||word.length<3) return;
        const vm=vocabMap[lw];
        if(!vm) return;
        const pool=cl.vocab.filter(v=>v.type===vm.type&&v.en.toLowerCase()!==vm.en.toLowerCase());
        if(pool.length<3) return;
        const wrong=pick(pool,3).map(v=>v.en);
        const blanked=[...words]; blanked[idx]='___';
        results.push({sentence:blanked.join(' ')+suffix, blank:word, hint:hint||'', distractors:wrong, src:'vocab'});
      });
    });
  });

  // 중복 제거
  const seen=new Set();
  return results.filter(r=>{
    const key=r.sentence+'|'+r.blank;
    if(seen.has(key)) return false;
    seen.add(key); return true;
  });
}

function buildBlank(cl){
  // 수동으로 작성한 문제
  const manual=(cl.fillBlanks||[]).map(b=>{
    const disp=b.sentence.replace('___','<span style="color:var(--accent);font-weight:700">___</span>');
    return {label:'빈칸 채우기',main:disp,sub:`힌트: ${b.hint}`,correct:b.blank,options:shuffle([b.blank,...b.distractors])};
  });
  // 예문에서 자동 생성한 문제
  const auto=autoBlankFromExamples(cl).map(b=>{
    const disp=b.sentence.replace('___','<span style="color:var(--accent);font-weight:700">___</span>');
    return {label:'빈칸 채우기',main:disp,sub:`💬 ${b.hint}`,correct:b.blank,options:shuffle([b.blank,...b.distractors])};
  });
  return shuffle([...manual,...auto]);
}

function buildMixed(cl){
  // 4가지 유형에서 각각 문제를 뽑아 균등하게 섞기
  const kr2en = buildKr2En(cl);
  const blank  = buildBlank(cl);
  const typing = buildTyping(cl);

  // 각 유형에서 최소 1문제씩 보장, 총량 균등 분배
  const perType = Math.max(1, Math.floor(Math.min(kr2en.length, blank.length, typing.length, 5)));

  const pool = [
    ...shuffle(kr2en).slice(0, perType),
    ...shuffle(blank).slice(0, perType),
    ...shuffle(typing).slice(0, perType),
  ];

  // 모든 유형이 1개 이상 포함되도록 보장
  const guaranteed = [
    kr2en[0],   // 한→영 객관식
    blank[0],   // 빈칸 채우기
    typing[0],  // 직접 입력
  ].filter(Boolean);

  // 중복 제거 후 합치기
  const seen = new Set(guaranteed.map(q=>q.correct+q.main));
  const extras = pool.filter(q=>!seen.has(q.correct+q.main));

  return shuffle([...guaranteed, ...extras]);
}

function startQuiz(mode){
  quizMode=mode; quizIdx=0; quizScore=0; wrongList=[];
  const cl=curClass;
  if(mode==='kr2en') quizQuestions=buildKr2En(cl);
  else if(mode==='blank') quizQuestions=buildBlank(cl);
  else if(mode==='mixed') quizQuestions=buildMixed(cl);
  else if(mode==='typing') quizQuestions=buildTyping(cl);
  document.getElementById('qz-menu').classList.add('hide');
  document.getElementById('qz-active').classList.add('show');
  document.getElementById('qz-result').classList.remove('show');
  document.getElementById('qz-mode-title').textContent={kr2en:'🇰🇷 한→영 객관식',blank:'✏️ 빈칸 채우기',mixed:'🎲 전체 랜덤 혼합',typing:'⌨️ 한→영 직접 입력'}[mode];
  renderQuestion();
}

function renderQuestion(){
  const q=quizQuestions[quizIdx],total=quizQuestions.length;
  curCorrect=q.correct;
  document.getElementById('qz-counter').textContent=`${quizIdx+1} / ${total}`;
  document.getElementById('qz-bar').style.width=`${(quizIdx/total)*100}%`;
  document.getElementById('qz-feedback').className='quiz-feedback';
  document.getElementById('qz-next').classList.remove('show');
  document.getElementById('qz-card').innerHTML=`
    <div class="quiz-label">${q.label}</div>
    <div class="quiz-q-main">${q.main}</div>
    ${q.sub?`<div class="quiz-q-sub">${q.sub}</div>`:''}`;

  const isTyping=(quizMode==='typing')||(q.options&&q.options.length===0);
  document.getElementById('qz-typing').style.display=isTyping?'block':'none';
  document.getElementById('qz-options').style.display=isTyping?'none':'grid';

  if(isTyping){
    const inp=document.getElementById('qz-input');
    inp.value=''; inp.className='typing-input'; inp.disabled=false;
    setTimeout(()=>inp.focus(),100);
    inp.onkeydown=e=>{ if(e.key==='Enter') submitTyping(); };
  } else {
    const optBox=document.getElementById('qz-options');
    optBox.innerHTML=q.options.map(o=>{
      const safe=o.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
      return `<button class="opt-btn" data-val="${safe}"><span>${o}</span></button>`;
    }).join('');
    optBox.querySelectorAll('.opt-btn').forEach(btn=>{
      btn.addEventListener('click',()=>checkAnswer(btn,btn.dataset.val,curCorrect));
    });
  }
}

// ── localStorage 오답 저장 ──
function wnKey(cl){ return `wn_${curLevel.id}_${cl.id}`; }

function loadWN(cl){
  try{ return JSON.parse(localStorage.getItem(wnKey(cl))||'{}'); }
  catch(e){ return {}; }
}

function saveWrong(cl, q, myAns, correct){
  const data=loadWN(cl);
  const key=correct; // 정답을 key로 사용
  if(!data[key]) data[key]={correct, q:q.replace(/<[^>]+>/g,''), wrongs:{}, count:0};
  data[key].count++;
  const m=(myAns||'(미입력)').trim();
  data[key].wrongs[m]=(data[key].wrongs[m]||0)+1;
  try{ localStorage.setItem(wnKey(cl), JSON.stringify(data)); }catch(e){}
}

function clearWN(cl){
  if(!confirm('이 클래스의 오답노트를 전부 지울까요?')) return;
  try{ localStorage.removeItem(wnKey(cl)); }catch(e){}
  document.getElementById('panel-5').innerHTML=renderWrongNote(cl);
}

function renderWrongNote(cl){
  const data=loadWN(cl);
  const items=Object.values(data).sort((a,b)=>b.count-a.count);
  if(!items.length) return `<div class="wn-empty">아직 오답 기록이 없어요.<br>퀴즈를 풀면 여기에 쌓여요 📝</div>`;

  const total=items.reduce((s,i)=>s+i.count,0);
  const danger=items.filter(i=>i.count>=3).length;
  const warn=items.filter(i=>i.count===2).length;
  const once=items.filter(i=>i.count===1).length;

  return `
    <div class="wn-summary">
      <div class="wn-stat"><div class="wn-stat-num red">${danger}</div><div class="wn-stat-label">자주 틀림 (3+)</div></div>
      <div class="wn-stat"><div class="wn-stat-num yellow">${warn}</div><div class="wn-stat-label">가끔 틀림 (2)</div></div>
      <div class="wn-stat"><div class="wn-stat-num green">${once}</div><div class="wn-stat-label">한 번 틀림</div></div>
    </div>
    ${danger?`<div class="wn-section-title">🔴 자주 틀리는 항목 (3번 이상)</div>
    ${items.filter(i=>i.count>=3).map(i=>wnCard(i,'danger')).join('')}`:''}
    ${warn?`<div class="wn-section-title">🟡 가끔 틀리는 항목 (2번)</div>
    ${items.filter(i=>i.count===2).map(i=>wnCard(i,'warn')).join('')}`:''}
    <div class="wn-section-title">⚪ 한 번 틀린 항목</div>
    ${items.filter(i=>i.count===1).map(i=>wnCard(i,'')).join('')}
    <button class="wn-clear-btn" onclick="clearWN(curClass)">오답노트 초기화</button>`;
}

function wnCard(item, level){
  const wrongTags=Object.entries(item.wrongs)
    .sort((a,b)=>b[1]-a[1])
    .map(([w,n])=>`<span class="wn-wrong-tag">${w} (${n}번)</span>`).join('');
  return `<div class="wn-card ${level}">
    <div class="wn-card-top">
      <div class="wn-card-q">${item.q}</div>
      <span class="wn-badge ${level||'warn'}">${item.count}번 틀림</span>
    </div>
    <div class="wn-ans">✅ 정답: ${item.correct}</div>
    <div class="wn-wrong-list">${wrongTags}</div>
  </div>`;
}

function checkAnswer(btn,chosen,correct){
  document.querySelectorAll('.opt-btn').forEach(b=>{
    b.disabled=true;
    if(b.dataset.val===correct) b.classList.add('correct');
    else if(b===btn&&chosen!==correct) b.classList.add('wrong');
  });
  const fb=document.getElementById('qz-feedback');
  if(chosen===correct){
    quizScore++;fb.textContent='✅ 정답!';fb.className='quiz-feedback correct';
  } else {
    fb.textContent=`❌ 정답: ${correct}`;fb.className='quiz-feedback wrong';
    wrongList.push({q:quizQuestions[quizIdx].main, mine:chosen, ans:correct});
    saveWrong(curClass, quizQuestions[quizIdx].main, chosen, correct);
  }
  document.getElementById('qz-bar').style.width=`${((quizIdx+1)/quizQuestions.length)*100}%`;
  document.getElementById('qz-next').classList.add('show');
}

// 타이핑 채점 (대소문자·앞뒤공백·마침표 무시)
function normalize(s){
  return s.toLowerCase()
    .replace(/[,.!?'"]/g,'')   // 구두점·따옴표 제거
    .replace(/'/g,'')           // 아포스트로피 제거 (don't→dont)
    .trim()
    .replace(/\s+/g,' ');
}

function submitTyping(){
  const inp=document.getElementById('qz-input');
  const typed=inp.value;
  if(!typed.trim()) return;
  const correct=curCorrect;
  const ok=normalize(typed)===normalize(correct);
  inp.disabled=true;
  const fb=document.getElementById('qz-feedback');
  const next=document.getElementById('qz-next');

  // 모범 답안 박스 (항상 표시)
  let modelBox='';
  if(!ok){
    modelBox=`<div class="model-ans-box">
      💡 이런 답도 있어요
      <strong>${correct}</strong>
    </div>
    <button class="self-correct-btn" onclick="selfCorrect()">✋ 내 답도 맞아요</button>`;
  } else {
    // 정답이어도 모범 답안이 다르면 참고용으로 표시
    if(normalize(typed)!==normalize(correct)){
      modelBox=`<div class="model-ans-box">참고 모범 답안<strong>${correct}</strong></div>`;
    }
  }

  if(ok){
    quizScore++;
    inp.className='typing-input correct-input';
    fb.textContent='✅ 정답!';fb.className='quiz-feedback correct';
  } else {
    inp.className='typing-input wrong-input';
    fb.textContent='❌ 틀렸어요. 아래 버튼으로 직접 채점할 수 있어요.';
    fb.className='quiz-feedback wrong';
    wrongList.push({q:quizQuestions[quizIdx].main, mine:typed, ans:correct});
    saveWrong(curClass, quizQuestions[quizIdx].main, typed, correct);
  }

  // 모범 답안 + 자기 채점 버튼 삽입 (feedback 아래, next 위)
  let existBox=document.getElementById('model-ans-insert');
  if(existBox) existBox.remove();
  if(modelBox){
    const box=document.createElement('div');
    box.id='model-ans-insert';
    box.innerHTML=modelBox;
    next.parentNode.insertBefore(box, next);
  }

  document.getElementById('qz-bar').style.width=`${((quizIdx+1)/quizQuestions.length)*100}%`;
  next.classList.add('show');
}

function selfCorrect(){
  // 틀렸지만 내 답이 맞다고 직접 채점
  quizScore++;
  // 오답노트에서 마지막 항목 제거
  wrongList.pop();
  const fb=document.getElementById('qz-feedback');
  fb.textContent='✅ 정답으로 처리했어요!';
  fb.className='quiz-feedback correct';
  const inp=document.getElementById('qz-input');
  inp.className='typing-input correct-input';
  // 자기 채점 버튼 숨기기
  const btn=document.querySelector('.self-correct-btn');
  if(btn) btn.style.display='none';
  document.getElementById('qz-bar').style.width=`${((quizIdx+1)/quizQuestions.length)*100}%`;
}

function clearModelBox(){
  const b=document.getElementById('model-ans-insert');
  if(b) b.remove();
}

// 타이핑 퀴즈 문제 생성 (예문 한국어 → 영어 전체 문장)
function buildTyping(cl){
  return shuffle(cl.examples.filter(e=>e.en&&e.kr)).map(e=>({
    label:'한국어 → 영어 입력',
    main:e.kr,
    sub:'영어 문장 전체를 입력하세요',
    correct:e.en,
    options:[]
  }));
}

function nextQuestion(){
  clearModelBox();
  quizIdx++;
  if(quizIdx>=quizQuestions.length){showResult();return;}
  renderQuestion();
}

function showResult(){
  document.getElementById('qz-active').classList.remove('show');
  const res=document.getElementById('qz-result');res.classList.add('show');
  const pct=Math.round(quizScore/quizQuestions.length*100);
  document.getElementById('qz-emoji').textContent=pct>=90?'🏆':pct>=70?'👍':pct>=50?'😅':'💪';
  document.getElementById('qz-score').textContent=`${quizScore} / ${quizQuestions.length}`;
  document.getElementById('qz-result-label').textContent=pct>=90?'완벽해요! 🎉':pct>=70?'잘하고 있어요! 조금만 더!':pct>=50?'절반 넘었어요. 다시 한번!':'조금 더 복습해봐요 💪';
  // 오답노트
  const noteSection=document.getElementById('wrong-note');
  const noteList=document.getElementById('wrong-note-list');
  if(wrongList.length>0){
    noteSection.classList.add('show');
    noteList.innerHTML=wrongList.map(w=>`
      <div class="wrong-item">
        <div class="wrong-item-q">❓ ${w.q.replace(/<[^>]+>/g,'')}</div>
        <div class="wrong-item-my">내 답: ${w.mine||'(미입력)'}</div>
        <div class="wrong-item-ans">✅ 정답: ${w.ans}</div>
      </div>`).join('');
  } else {
    noteSection.classList.remove('show');
  }
}

function retryQuiz(){startQuiz(quizMode);}

function exitQuiz(){
  document.getElementById('qz-menu').classList.remove('hide');
  document.getElementById('qz-active').classList.remove('show');
  document.getElementById('qz-result').classList.remove('show');
}

function showView(id){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function goBack(){
  if(document.getElementById('view-class').classList.contains('active')){
    showView('view-level');
    document.getElementById('back-btn').style.display='none';
  }
}

// ── TTS 발음 보정 ──
function fixPron(text){
  return text
    .replace(/\bread the\b/gi,'red the')
    .replace(/\bread a\b/gi,'red a')
    .replace(/\bI read\b/gi,'I red')
    .replace(/\bHe read\b/gi,'He red')
    .replace(/\bShe read\b/gi,'She red');
}
// read → read 특수처리: 과거형 part가 "read"면 "red"로
function fixPastPart(word){
  return word.trim().toLowerCase()==='read'?'red':word.trim();
}
// ── TTS (브라우저 내장) ──
// ── Kokoro TTS (고품질) + 브라우저 폴백 ──
function speakUtt(text,onEnd,rate){
  if(window._kokoroReady && window._kokoroSpeak){
    window._kokoroSpeak(text,onEnd,rate);
  } else {
    // 브라우저 내장 폴백
    const utt=new SpeechSynthesisUtterance(text);
    utt.lang='en-US';utt.rate=rate||1;
    const voices=window.speechSynthesis.getVoices();
    const voice=
      voices.find(v=>v.lang==='en-US'&&/samantha|karen|victoria|zoe|ava/i.test(v.name))||
      voices.find(v=>v.lang==='en-US'&&v.name.toLowerCase().includes('female'))||
      voices.find(v=>v.lang==='en-US');
    if(voice)utt.voice=voice;
    utt.onend=onEnd;utt.onerror=onEnd;
    window.speechSynthesis.speak(utt);
  }
}

let ttsBtn=null;
function tts(text,btn){
  window.speechSynthesis.cancel();
  if(window._kokoroCurrent){try{window._kokoroCurrent.stop();}catch(e){}}
  if(ttsBtn){ttsBtn.classList.remove('playing');ttsBtn.textContent='🔊';}
  if(ttsBtn===btn){ttsBtn=null;return;}
  ttsBtn=btn;
  btn.classList.add('playing');btn.textContent='⏸';
  const done=()=>{
    if(ttsBtn===btn){btn.classList.remove('playing');btn.textContent='🔊';ttsBtn=null;}
  };
  const arrow=text.match(/^(.+?)\s*→\s*(.+)$/);
  if(arrow){
    const p1=fixPron(arrow[1].trim());
    const p2=fixPastPart(fixPron(arrow[2].trim()));
    speakUtt(p1,()=>{
      if(ttsBtn!==btn)return;
      setTimeout(()=>{
        if(ttsBtn!==btn)return;
        speakUtt(p2,done,1.1);
      },450);
    },1.1);
  } else {
    speakUtt(fixPron(text),done,1);
  }
}
window.speechSynthesis.onvoiceschanged=()=>{ window.speechSynthesis.getVoices(); };

init();
</script>

<!-- Kokoro TTS 모듈 -->
<script type="module">
import { KokoroTTS } from 'https://cdn.jsdelivr.net/npm/kokoro-js@1.1.3/dist/kokoro.mjs';

const banner = document.getElementById('tts-loading-banner');

async function initKokoro(){
  if(banner) banner.style.display='flex';
  try{
    const model = await KokoroTTS.from_pretrained('onnx-community/Kokoro-82M-v1.0',{
      dtype:'q8',
      device:'wasm',
    });

    window._kokoroReady = true;

    window._kokoroSpeak = async function(text, onEnd, rate){
      try{
        const audioCtx = new (window.AudioContext||window.webkitAudioContext)();
        const result = await model.generate(text,{voice:'af_heart',speed:rate||1});
        const buf = audioCtx.createBuffer(1, result.audio.length, result.sampling_rate);
        buf.copyToChannel(result.audio, 0);
        const src = audioCtx.createBufferSource();
        src.buffer = buf;
        src.connect(audioCtx.destination);
        window._kokoroCurrent = src;
        src.onended = ()=>{ if(onEnd) onEnd(); };
        src.start();
      } catch(e){
        console.warn('Kokoro error:',e);
        if(onEnd) onEnd();
      }
    };

    if(banner) banner.style.display='none';
    console.log('✅ Kokoro TTS 준비 완료!');
  } catch(e){
    console.warn('Kokoro 로드 실패, 브라우저 TTS 사용:', e);
    if(banner) banner.style.display='none';
  }
}

initKokoro();
</script>
